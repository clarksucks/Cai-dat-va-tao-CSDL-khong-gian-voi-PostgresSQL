<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>KCN Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
#map { height: 100vh; }
</style>
</head>
<body>
<div id="map"></div>

<script>
const map = L.map('map').setView([18.2068,108.7240], 15)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map)

const buildingLayer = L.layerGroup().addTo(map)
const roadLayer = L.layerGroup().addTo(map)
const garbadgeLayer = L.layerGroup().addTo(map)
const boundsLayer = L.layerGroup().addTo(map)
const instructionLayer = L.layerGroup().addTo(map)

fetch('http://localhost:3000/all')
  .then(res => res.json())
  .then(data => {
    L.geoJSON(data, {
      style: function(feature) {
        switch(feature.properties.layer) {
          case 'building':
            return { color: 'blue' }
          case 'road':
            return { color: 'black' }
          case 'garbadge':
            return { color: 'green' }
          case 'bounds':
            return { color: 'red', weight: 4, fill: false }
          case 'instruction-generated':
            return { color: 'orange' }
        }
      },
      onEachFeature: function(feature, layer) {
        switch(feature.properties.layer) {
          case 'building':
            buildingLayer.addLayer(layer)
            break
          case 'road':
            roadLayer.addLayer(layer)
            break
          case 'garbadge':
            garbadgeLayer.addLayer(layer)
            break
          case 'bounds':
            boundsLayer.addLayer(layer)
            break
          case 'instruction-generated':
            instructionLayer.addLayer(layer)
            break
        }
      }
    })
  })

L.control.layers(null, {
  "Building": buildingLayer,
  "Road": roadLayer,
  "Garbadge": garbadgeLayer,
  "Bounds": boundsLayer,
  "Instruction": instructionLayer
}).addTo(map)

</script>
</body>
</html>
