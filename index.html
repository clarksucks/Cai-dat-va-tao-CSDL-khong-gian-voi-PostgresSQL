<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Bản đồ KCN - PostGIS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; }
        #map { height: 100%; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Khởi tạo bản đồ tại khu vực có dữ liệu (Ba Vì/Sơn Tây)
        const map = L.map('map').setView([21.13, 105.45], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        fetch('https://cai-dat-va-tao-csdl-khong-gian-voi.onrender.com/all')
            .then(res => res.json())
            .then(data => {
                const geoLayer = L.geoJSON(data, {
                    // Hiển thị điểm bãi rác
                    pointToLayer: function (feature, latlng) {
                        if (feature.properties.layer === "garbadge") {
                            return L.circleMarker(latlng, {
                                radius: 10,
                                fillColor: "orange",
                                color: "#000",
                                weight: 1,
                                fillOpacity: 0.9
                            });
                        }
                    },
                    // Định dạng cho đường và vùng
                    style: function (feature) {
                        switch(feature.properties.layer) {
                            case 'road': return { color: 'blue', weight: 3 };
                            case 'building': return { color: 'gray', weight: 1, fillOpacity: 0.4 };
                            case 'bounds': return { color: 'red', weight: 2, dashArray: '5,5' };
                            case 'instruction-generated': return { color: 'green', weight: 2 };
                            default: return { color: 'black' };
                        }
                    },
                    onEachFeature: function (feature, layer) {
                        layer.bindPopup("<b>Lớp:</b> " + feature.properties.layer);
                    }
                }).addTo(map);

                // Tự động căn chỉnh màn hình để thấy hết các điểm dữ liệu
                if (data.features && data.features.length > 0) {
                    map.fitBounds(geoLayer.getBounds());
                }
            })
            .catch(err => console.error("Lỗi fetch:", err));
    </script>
</body>
</html>
